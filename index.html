<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats LinkedIn – Studio Pagaille</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT (défaut) ── */
    :root {
      --bg:       #F9F8F7;
      --surface:  #ffffff;
      --border:   #e8e6e3;
      --border2:  #d4d0cb;
      --text:     #1a1a18;
      --muted:    #8f8b84;
      --muted2:   #c4c0ba;
      --blue:     #2c5fe0;
      --pink:     #d63f74;
      --green:    #1a9456;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    /* ── DARK (système) ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0c0e14;
        --surface: #12151f;
        --border:  #1c2133;
        --border2: #242a3a;
        --text:    #d0d8ef;
        --muted:   #4a5470;
        --muted2:  #2e3650;
        --blue:    #4f8fff;
        --pink:    #ff5c9e;
        --green:   #4ecb8d;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 13px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .brand {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted2);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-link {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted2);
      text-decoration: none;
      letter-spacing: .06em;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all .15s;
    }
    .detail-link:hover {
      color: var(--blue);
      border-color: var(--border2);
      background: var(--bg);
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted2);
      width: 24px;
      height: 24px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      padding: 0;
      line-height: 1;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--border2); background: var(--border); }
    .refresh-btn.spinning { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── WIDGET BODY ── */
    .widget-body { padding: 12px 13px 11px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 10px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 10px 8px;
    }

    .kpi-label {
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kpi-val {
      font-size: 15px;        /* réduit vs avant */
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }

    .kpi-delta {
      font-size: 9px;
      font-family: var(--mono);
      margin-top: 3px;
    }

    .up   { color: var(--green); }
    .down { color: #c0392b; }

    /* ── CHART ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px 7px;
    }

    .chart-label {
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted2);
      margin-bottom: 7px;
    }

    canvas { max-height: 80px; }

    /* ── LOADING ── */
    #loading {
      text-align: center;
      padding: 36px 0;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted2);
      letter-spacing: .08em;
    }

    /* ══════════════════════
       MODE DÉTAIL
    ══════════════════════ */
    body.detail-mode canvas { max-height: 200px !important; }

    .detail-title-bar {
      padding: 16px 13px 12px;
      display: none;
    }
    body.detail-mode .detail-title-bar { display: block; }
    .detail-title { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
    .detail-range { font-size: 11px; font-family: var(--mono); color: var(--muted); }

    .toggles {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    .toggle {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 10px;
      font-family: var(--mono); color: var(--muted);
      transition: opacity .2s; user-select: none;
    }
    .toggle.off { opacity: .3; }
    .toggle-line { width: 18px; height: 2px; border-radius: 2px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); margin-top: 12px; }
    th {
      text-align: right; font-size: 9px; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted2);
      padding: 9px 12px; border-bottom: 1px solid var(--border);
    }
    th:first-child { text-align: left; }
    td {
      text-align: right; padding: 8px 12px;
      border-bottom: 1px solid var(--border); color: var(--muted);
    }
    td:first-child { text-align: left; color: var(--text); opacity: .7; }
    tr:last-child td { border-bottom: none; }

    .table-wrap {
      display: none;
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="brand" id="topbar-brand">Studio Pagaille · LinkedIn</span>
  <div class="topbar-right">
    <a class="detail-link" id="detail-link" href="?mode=detail" target="_blank">Détail →</a>
    <button class="refresh-btn" id="refresh-btn" title="Actualiser">↻</button>
  </div>
</div>

<div id="loading">Chargement…</div>

<div id="main" style="display:none">

  <div class="detail-title-bar">
    <div class="detail-title">Stats hebdomadaires</div>
    <div class="detail-range" id="detail-range"></div>
  </div>

  <div class="widget-body">

    <div class="kpis" id="kpis"></div>

    <div class="chart-wrap">
      <div class="chart-label" id="chart-label">Impressions · dernières semaines</div>
      <div class="toggles" id="toggles" style="display:none"></div>
      <canvas id="chart"></canvas>
    </div>

    <div class="table-wrap" id="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Semaine</th>
            <th>Impressions</th>
            <th>Réactions</th>
            <th>Commentaires</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
const C = { impressions:"#2c5fe0", reactions:"#d63f74", commentaires:"#1a9456" };

// Dark mode : ajuste les couleurs des courbes si dark
const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
if (dark) { C.impressions="#4f8fff"; C.reactions="#ff5c9e"; C.commentaires="#4ecb8d"; }

let allData = [], chartInst = null;
let active = { impressions:true, reactions:true, commentaires:true };
const isDetail = new URLSearchParams(location.search).get("mode") === "detail";

if (isDetail) {
  document.body.classList.add("detail-mode");
  document.getElementById("detail-link").style.display = "none";
  document.getElementById("topbar-brand").textContent = "Stats hebdomadaires";
}

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  document.getElementById("loading").style.display = "block";
  document.getElementById("main").style.display = "none";

  try {
    const res = await fetch("/api/stats");
    allData = await res.json();
    if (!Array.isArray(allData) || !allData.length) throw new Error("Aucune donnée. Ajoute des semaines dans Notion.");
    render();
  } catch(e) {
    document.getElementById("loading").textContent = "Erreur : " + e.message;
  } finally {
    btn.classList.remove("spinning");
  }
}

function render() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";

  const latest = allData[allData.length - 1];
  const prev   = allData[allData.length - 2];

  if (isDetail) {
    document.getElementById("detail-range").textContent =
      `${allData[0].semaine} → ${latest.semaine}`;
  }

  // KPIs
  const fields = [
    { key:"impressions",  label:"Impressions", color:C.impressions },
    { key:"reactions",    label:"Réactions",   color:C.reactions },
    { key:"commentaires", label:"Comm.",        color:C.commentaires },
  ];

  document.getElementById("kpis").innerHTML = fields.map(({key, label, color}) => {
    const val = latest[key], pval = prev?.[key];
    const delta = pval ? ((val - pval) / pval * 100).toFixed(0) : null;
    const cls = delta > 0 ? "up" : "down";
    return `<div class="kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-val" style="color:${color}">${val.toLocaleString("fr-FR")}</div>
      ${delta !== null ? `<div class="kpi-delta ${cls}">${delta>0?"▲":"▼"}${Math.abs(delta)}%${isDetail?" vs S-1":""}</div>` : ""}
    </div>`;
  }).join("");

  if (isDetail) {
    document.getElementById("chart-label").textContent =
      `Évolution sur ${allData.length} semaine${allData.length>1?"s":""}`;
    document.getElementById("toggles").style.display = "flex";
    document.getElementById("table-wrap").style.display = "block";
    renderToggles();
    renderTable();
  }

  renderChart();
}

function renderToggles() {
  document.getElementById("toggles").innerHTML =
    ["impressions","reactions","commentaires"].map(key =>
      `<div class="toggle ${active[key]?"":"off"}" onclick="toggleLine('${key}')">
        <div class="toggle-line" style="background:${C[key]}"></div>
        <span>${key.charAt(0).toUpperCase()+key.slice(1)}</span>
      </div>`
    ).join("");
}

function toggleLine(key) {
  active[key] = !active[key];
  renderToggles();
  renderChart();
}

function renderChart() {
  if (chartInst) chartInst.destroy();

  const gridColor = dark ? "#1c2133" : "#eeece9";
  const tickColor = dark ? "#2e3650" : "#c4c0ba";

  const datasets = [];

  if (!isDetail) {
    const data = allData.slice(-8);
    datasets.push({
      data: data.map(d => d.impressions),
      borderColor: C.impressions,
      borderWidth: 1.5,
      pointRadius: 2,
      fill: true,
      backgroundColor: C.impressions + "18",
      tension: 0.4,
    });
    chartInst = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "line",
      data: { labels: data.map(d => d.semaine), datasets },
      options: {
        responsive: true,
        animation: false,
        plugins: { legend:{display:false}, tooltip:{enabled:false} },
        scales: { x:{display:false}, y:{display:false} },
      }
    });
    return;
  }

  // Détail
  if (active.impressions) datasets.push({ label:"Impressions", data:allData.map(d=>d.impressions), borderColor:C.impressions, borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:.3, yAxisID:"y1", fill:false });
  if (active.reactions)   datasets.push({ label:"Réactions",   data:allData.map(d=>d.reactions),   borderColor:C.reactions,   borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:.3, yAxisID:"y2", fill:false });
  if (active.commentaires)datasets.push({ label:"Commentaires",data:allData.map(d=>d.commentaires),borderColor:C.commentaires,borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:.3, yAxisID:"y2", fill:false });

  chartInst = new Chart(document.getElementById("chart").getContext("2d"), {
    type: "line",
    data: { labels: allData.map(d => d.semaine), datasets },
    options: {
      responsive: true,
      interaction: { mode:"index", intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor: dark ? "#0c0e14" : "#ffffff",
          borderColor: dark ? "#1c2133" : "#e8e6e3",
          borderWidth: 1,
          titleColor: dark ? "#4a5470" : "#8f8b84",
          bodyColor:  dark ? "#d0d8ef" : "#1a1a18",
          titleFont: { family:"'IBM Plex Mono'", size:10 },
          bodyFont:  { family:"'IBM Plex Mono'", size:11 },
        }
      },
      scales: {
        x:  { ticks:{color:tickColor, font:{family:"'IBM Plex Mono'",size:9}}, grid:{color:gridColor} },
        y1: { position:"left",  ticks:{color:tickColor, font:{family:"'IBM Plex Mono'",size:9}}, grid:{color:gridColor} },
        y2: { position:"right", ticks:{color:tickColor, font:{family:"'IBM Plex Mono'",size:9}}, grid:{display:false} },
      }
    }
  });
}

function renderTable() {
  document.getElementById("table-body").innerHTML =
    [...allData].reverse().map(row => `
      <tr>
        <td>${row.semaine}</td>
        <td style="color:${C.impressions}">${row.impressions.toLocaleString("fr-FR")}</td>
        <td style="color:${C.reactions}">${row.reactions}</td>
        <td style="color:${C.commentaires}">${row.commentaires}</td>
      </tr>
    `).join("");
}

document.getElementById("refresh-btn").addEventListener("click", loadData);

// Réagit aux changements de mode en direct (ex: auto-switch macOS)
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  location.reload();
});

loadData();
</script>
</body>
</html>
